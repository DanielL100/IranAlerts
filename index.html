<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מנבא התרעות 2026 - v10</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        :root { --bg: #f0f4f8; --accent: #2563eb; }
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; }

        .source-btn {
            background: #38bdf8; color: #0f172a; border: none;
            padding: 12px 25px; border-radius: 12px; font-weight: bold;
            cursor: pointer; margin-bottom: 20px; transition: 0.2s; display: inline-block;
        }
        .source-btn:hover { background: #7dd3fc; }

        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }

        .chart-container { position: relative; height: 420px; width: 100%; }

        /* 3 ניבויים */
        .multi-preds { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
        @media (max-width: 760px) { .multi-preds { grid-template-columns: 1fr; } }
        .pred-card { border-radius: 18px; padding: 20px 18px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); color: white; }
        .pred-card-1 { background: linear-gradient(135deg, #1e3a8a, #3b82f6); }
        .pred-card-2 { background: linear-gradient(135deg, #1e293b, #475569); }
        .pred-card-3 { background: linear-gradient(135deg, #292524, #78716c); }
        .pred-label  { font-size: 0.72em; font-weight: 700; opacity: 0.7; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
        .pred-time   { font-size: 2.6em; font-weight: 900; line-height: 1.05; margin-bottom: 2px; }
        .pred-range  { font-size: 0.74em; opacity: 0.75; margin-bottom: 10px; }
        .pred-pills  { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .pred-pill   { background: rgba(255,255,255,0.2); border-radius: 8px; padding: 3px 10px; font-size: 0.78em; }
        .pred-conf-wrap  { height: 6px; background: rgba(255,255,255,0.2); border-radius: 99px; overflow: hidden; margin-bottom: 4px; }
        .pred-conf-fill  { height: 100%; border-radius: 99px; transition: width 0.7s ease; }
        .pred-conf-label { font-size: 0.7em; opacity: 0.75; }

        /* algo */
        .algo-breakdown { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .algo-card   { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; text-align: center; }
        .algo-name   { font-size: 0.72em; color: #64748b; margin-bottom: 4px; }
        .algo-val    { font-size: 1.1em; font-weight: 700; color: #334155; }
        .algo-weight { font-size: 0.68em; color: #94a3b8; }

        .section-title { font-size: 0.85em; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }

        /* טבלה — ללא גלילה פנימית, נפרסת לגמרי */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: right; border-bottom: 1px solid #f1f5f9; font-size: 0.88em; }
        th { background: #f8fafc; font-weight: 700; color: #475569; }
        td.cities { color: #475569; font-size: 0.82em; max-width: 500px; word-break: break-word; }
        .badge { display: inline-block; padding: 2px 9px; border-radius: 99px; font-size: 0.78em; font-weight: 700; }
        .badge-high { background: #fef2f2; color: #dc2626; }
        .badge-med  { background: #fffbeb; color: #d97706; }
        .badge-low  { background: #f0fdf4; color: #16a34a; }

        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1.2s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #refreshBtn { float: left; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .stat-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .stat-box { background: white; border-radius: 14px; padding: 14px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); flex: 1; min-width: 130px; text-align: center; }
        .stat-box span { display: block; }
        .stat-box .sv { font-size: 1.7em; font-weight: 800; color: #0f172a; }
        .stat-box .sl { font-size: 0.78em; color: #64748b; margin-top: 2px; }
    </style>
</head>
<body>
<div class="container">

    <div class="top-bar">
        <button class="source-btn" onclick="openSources()">📂 מקורות נתונים</button>
        <button class="source-btn" id="refreshBtn" onclick="fetchFromGithub()" style="background:#e2e8f0">🔄 רענן נתונים</button>
    </div>

    <div class="card" id="status-panel">
        <h2>מנבא מטחים v10 — ללא חלוקה לגזרות</h2>
        <div id="status-content">
            <p>מתחבר ל-GitHub...</p>
            <div class="loading-spinner"></div>
        </div>
    </div>

    <div id="dashboard" style="display:none">

        <!-- סטטיסטיקה כללית -->
        <div class="stat-row" id="statRow"></div>

        <!-- 3 ניבויים -->
        <div class="section-title">3 ניבויים קדימה</div>
        <div class="multi-preds" id="multiPreds"></div>

        <!-- פירוט מודלים -->
        <div class="section-title">פירוט מודלים — Ensemble</div>
        <div class="algo-breakdown" id="algoBreakdown"></div>

        <!-- גרף -->
        <div class="card">
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </div>

        <!-- טבלה -->
        <div class="card">
            <h4 style="margin-top:0" id="tableTitle">יומן מטחים — מ-28/02/2026</h4>
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>שעה</th>
                        <th>תאריך</th>
                        <th>עצימות</th>
                        <th>ערים</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

    </div>
</div>

<script>
function openSources() {
    window.open('https://github.com/DanielL100/IranAlerts/blob/main/history.json', '_blank');
	window.open('https://www.tzevaadom.co.il/static/historical/all.json', '_blank');
}

const GITHUB_JSON_URL = 'https://raw.githubusercontent.com/DanielL100/IranAlerts/refs/heads/main/history.json';
const CUTOFF_TS = Math.floor(new Date('2026-02-28T00:00:00').getTime() / 1000);

// סף מינימלי לישובים — מתחת לזה סביר שלא מטח ראקטות מאיראן
const MIN_SALVO_SIZE = 3;
// חלון קיבוץ: 5 דקות בין התרעות = אותו מטח (חלון גולש)
const GROUP_WINDOW_SEC = 300;

let salvos = [];       // מטחים מקובצים
let chart = null;
// ניבויים קפואים — נחשבים מחדש רק כשכל 3 עברו
let frozenPreds = null;

/* ============================================================
   GROUPING
   קיבוץ גולש: כל עוד ההפרש בין כל התרעה לקודמת ≤ 5 דק', הן אותו מטח
   ============================================================ */
function groupAlerts(alerts) {
    alerts.sort((a, b) => a.t - b.t);
    const result = [];
    if (!alerts.length) return result;

    let cur = {
        s: alerts[0].t,
        e: alerts[0].t,
        locs: new Set(alerts[0].locs)
    };

    for (let i = 1; i < alerts.length; i++) {
        if (alerts[i].t - cur.e <= GROUP_WINDOW_SEC) {
            cur.e = alerts[i].t;
            alerts[i].locs.forEach(l => cur.locs.add(l));
        } else {
            result.push({ s: cur.s, e: cur.e, count: cur.locs.size, list: Array.from(cur.locs) });
            cur = { s: alerts[i].t, e: alerts[i].t, locs: new Set(alerts[i].locs) };
        }
    }
    result.push({ s: cur.s, e: cur.e, count: cur.locs.size, list: Array.from(cur.locs) });
    return result;
}

/* ============================================================
   ENSEMBLE ENGINE
   ============================================================ */
function buildEnsemble(salvosArr) {
    if (salvosArr.length < 3) return null;

    const gaps = [];
    for (let i = 1; i < salvosArr.length; i++) gaps.push(salvosArr[i].s - salvosArr[i-1].e);

    // WMA — 8 אחרונים
    const N = Math.min(gaps.length, 8);
    let wSum = 0, wTotal = 0;
    for (let i = 0; i < N; i++) {
        const w = i + 1;
        wSum   += gaps[gaps.length - N + i] * w;
        wTotal += w;
    }
    const wmaGap = wSum / wTotal;

    // Median
    const sorted = [...gaps].sort((a, b) => a - b);
    const mid = Math.floor(sorted.length / 2);
    const medianGap = sorted.length % 2 === 0 ? (sorted[mid-1] + sorted[mid]) / 2 : sorted[mid];

    // EWM α=0.3
    let ewm = gaps[0];
    for (let i = 1; i < gaps.length; i++) ewm = 0.3 * gaps[i] + 0.7 * ewm;

    // ToD ±1.5ש'
    const refH = new Date(salvosArr[salvosArr.length-1].e * 1000);
    const refHour = refH.getHours() + refH.getMinutes() / 60;
    let todGaps = [];
    for (let i = 1; i < salvosArr.length; i++) {
        const d = new Date(salvosArr[i].s * 1000);
        const h = d.getHours() + d.getMinutes() / 60;
        let diff = Math.abs(h - refHour);
        if (diff > 12) diff = 24 - diff;
        if (diff <= 1.5) todGaps.push(salvosArr[i].s - salvosArr[i-1].e);
    }
    const todGap = todGaps.length >= 2 ? todGaps.reduce((a,b)=>a+b,0)/todGaps.length : null;

    const w1=0.35, w2=0.25, w3=0.20, w4=todGap?0.20:0;
    const tw = w1+w2+w3+w4;
    const gap = (w1*wmaGap + w2*medianGap + w3*ewm + (todGap?w4*todGap:0)) / tw;

    const variance = gaps.reduce((s,g) => s + Math.pow(g-gap,2), 0) / gaps.length;
    const std = Math.sqrt(variance);
    const cv = std / gap;
    let conf = Math.max(10, Math.min(95, Math.round(100*(1-cv*0.6))));
    if (gaps.length >= 6) conf = Math.min(conf+10, 95);
    if (todGap)           conf = Math.min(conf+8,  95);

    return {
        gap, std, conf,
        models: {
            'WMA (8 אחרונים)':  { gap: wmaGap,   weight: w1 },
            'חציון היסטורי':    { gap: medianGap, weight: w2 },
            'EWM (α=0.3)':      { gap: ewm,       weight: w3 },
            'שעות דומות (ToD)': { gap: todGap,    weight: todGap?w4:0 },
        }
    };
}

/*
 * computePredictions — 3 ניבויים קדימה, קפואים
 *
 * הניבויים מחושבים מ-last.e (סיום המטח האחרון) ונשארים קבועים.
 * רק כשכל 3 הניבויים עברו — מחשבים מחדש.
 */
function computePredictions(salvosArr) {
    const base = buildEnsemble(salvosArr);
    if (!base) return null;

    const now = Math.floor(Date.now() / 1000);
    const last = salvosArr[salvosArr.length - 1];
    const { gap, std, conf, models } = base;

    // בדוק אם הניבויים הקפואים עדיין תקינים
    if (frozenPreds) {
        const allPassed = frozenPreds.preds.every(p => p.predTs < now);
        if (!allPassed) return { preds: frozenPreds.preds, models };
    }

    // חשב ניבויים חדשים מסיום המטח האחרון
    const anchor = last.e;
    const recent = salvosArr.slice(-5);
    const avgCount = Math.round(recent.reduce((a,s) => a+s.count, 0) / recent.length);

    const preds = [];
    for (let i = 1; i <= 3; i++) {
        const predTs = anchor + gap * i;
        const decay = [1, 0.80, 0.65][i-1];
        const c = Math.max(10, Math.round(conf * decay));
        const spread = 0.8 + (i-1)*0.4;
        preds.push({
            index: i,
            predTs,
            time: new Date(predTs * 1000),
            rangeMin: new Date((predTs - std*spread) * 1000),
            rangeMax: new Date((predTs + std*spread) * 1000),
            minutes: Math.round((predTs - now) / 60),
            count: avgCount,
            confidence: c,
            passed: predTs < now
        });
    }

    frozenPreds = { preds, anchorSalvoEnd: last.e };
    return { preds, models };
}

/* ============================================================
   DATA LOAD
   ============================================================ */
async function fetchFromGithub() {
    const sc = document.getElementById('status-content');
    try {
        const res = await fetch(`${GITHUB_JSON_URL}?t=${Date.now()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        process(data);
        document.getElementById('status-panel').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
    } catch(err) {
        sc.innerHTML = `<p style="color:red;font-weight:bold">שגיאה: ${err.message}</p>
            <button onclick="fetchFromGithub()" style="padding:8px 18px;border-radius:10px;cursor:pointer;border:1px solid #ccc">נסה שוב</button>`;
    }
}

function process(data) {
    // רק ירי רקטות/טילים (d[1]===0) מה-cutoff
    const filtered = data
        .filter(d => d[3] >= CUTOFF_TS && d[1] === 0)
        .map(d => ({ t: d[3], locs: d[2] }));

    const all = groupAlerts(filtered);

    // סנן מטחים קטנים מדי (כנראה כטב"מ / שיגור מלבנון)
    salvos = all.filter(s => s.count >= MIN_SALVO_SIZE);

    // אפס ניבויים קפואים כשיש נתון חדש
    if (frozenPreds && salvos.length > 0) {
        const lastEnd = salvos[salvos.length-1].e;
        if (lastEnd > frozenPreds.anchorSalvoEnd) frozenPreds = null;
    }

    renderStats(all, salvos);
    renderPredictions();
    renderChart();
    renderTable(all); // טבלה — כל המטחים, כולל קטנים
}

/* ============================================================
   RENDER
   ============================================================ */
function fmt(d, secs = false) {
    const opts = { hour: '2-digit', minute: '2-digit' };
    if (secs) opts.second = '2-digit';
    return d.toLocaleTimeString('he-IL', opts);
}
function fmtDate(d) { return d.toLocaleDateString('he-IL'); }
function fmtGap(sec) {
    if (!sec || sec < 0) return '—';
    const m = Math.round(sec / 60);
    return m >= 60 ? `${Math.floor(m/60)}ש' ${m%60}ד'` : `${m} דק'`;
}
function fmtMins(mins, passed) {
    if (passed) return '✓ עבר';
    if (mins <= 0) return 'בקרוב!';
    return mins >= 60 ? `${Math.floor(mins/60)}ש' ${mins%60}ד'` : `${mins} דק'`;
}

function renderStats(all, filtered) {
    const row = document.getElementById('statRow');
    row.innerHTML = `
        <div class="stat-box"><span class="sv">${all.length}</span><span class="sl">מטחים סה"כ</span></div>
        <div class="stat-box"><span class="sv">${filtered.length}</span><span class="sl">מטחים גדולים (≥${MIN_SALVO_SIZE} ישובים)</span></div>
        <div class="stat-box"><span class="sv">${all.reduce((a,s)=>a+s.count,0)}</span><span class="sl">ישובים כלל אזעקות</span></div>
        <div class="stat-box"><span class="sv">${Math.round(filtered.reduce((a,s)=>a+s.count,0)/Math.max(filtered.length,1))}</span><span class="sl">ממוצע ישובים למטח</span></div>
    `;
}

function renderPredictions() {
    const result = computePredictions(salvos);
    const container = document.getElementById('multiPreds');
    const breakdown = document.getElementById('algoBreakdown');

    if (!result) {
        container.innerHTML = '<div style="color:#94a3b8;padding:10px">נדרשים לפחות 3 מטחים לחישוב</div>';
        breakdown.innerHTML = '';
        return;
    }

    const labels = ['מטח ראשון', 'מטח שני', 'מטח שלישי'];
    container.innerHTML = result.preds.map((p, i) => {
        const cc = p.confidence >= 60 ? '#4ade80' : p.confidence >= 35 ? '#fbbf24' : '#f87171';
        const op = p.passed ? 'opacity:0.5;' : '';
        return `<div class="pred-card pred-card-${i+1}" style="${op}">
            <div class="pred-label">${labels[i]}</div>
            <div class="pred-time">${fmt(p.time)}</div>
            <div class="pred-range">טווח: ${fmt(p.rangeMin)} – ${fmt(p.rangeMax)}</div>
            <div class="pred-pills">
                <span class="pred-pill">⏱ ${fmtMins(p.minutes, p.passed)}</span>
                <span class="pred-pill">🏘 ~${p.count} ישובים</span>
            </div>
            <div class="pred-conf-wrap">
                <div class="pred-conf-fill" style="width:${p.confidence}%;background:${cc}"></div>
            </div>
            <div class="pred-conf-label">ביטחון: ${p.confidence}%</div>
        </div>`;
    }).join('');

    breakdown.innerHTML = Object.entries(result.models).map(([name, m]) =>
        `<div class="algo-card">
            <div class="algo-name">${name}</div>
            <div class="algo-val">${fmtGap(m.gap)}</div>
            <div class="algo-weight">משקל: ${Math.round(m.weight*100)}%</div>
        </div>`
    ).join('');
}

function renderChart() {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (chart) chart.destroy();

    const result = computePredictions(salvos);

    const datasets = [{
        label: 'עצימות מטח (ישובים)',
        data: salvos.map(s => ({ x: s.s * 1000, y: s.count })),
        borderColor: '#2563eb',
        backgroundColor: '#2563eb22',
        borderWidth: 2.5,
        pointRadius: 4,
        fill: true,
        tension: 0.25
    }];

    if (result) {
        const colors = ['#f59e0b', '#94a3b8', '#cbd5e1'];
        result.preds.forEach((p, i) => {
            datasets.push({
                label: `ניבוי ${i+1}${p.passed?' (עבר)':''}`,
                data: [{ x: p.time.getTime(), y: p.count }],
                borderColor: colors[i], backgroundColor: colors[i],
                pointRadius: 10 - i*2,
                pointStyle: i===0 ? 'star' : 'circle',
                showLine: false, order: 0
            });
        });
    }

    chart = new Chart(ctx, {
        type: 'line', data: { datasets },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'nearest', axis: 'x', intersect: false },
            plugins: { legend: { position: 'top' } },
            scales: {
                x: { type: 'time', time: { unit: 'hour', displayFormats: { hour: 'dd/MM HH:mm' } }, title: { display: true, text: 'זמן' } },
                y: { beginAtZero: true, title: { display: true, text: 'ישובים במטח' } }
            }
        }
    });
}

function renderTable(allSalvos) {
    const tbody = document.querySelector('#historyTable tbody');
    const sorted = [...allSalvos].sort((a, b) => b.s - a.s);
    document.getElementById('tableTitle').innerText =
        `יומן מטחים — ${sorted.length} מטחים מ-28/02/2026`;

    tbody.innerHTML = sorted.map(s => {
        const d = new Date(s.s * 1000);
        const badge = s.count >= 15 ? `<span class="badge badge-high">${s.count}</span>`
                    : s.count >= MIN_SALVO_SIZE ? `<span class="badge badge-med">${s.count}</span>`
                    : `<span class="badge badge-low">${s.count}</span>`;
        return `<tr>
            <td><strong>${fmt(d, true)}</strong></td>
            <td>${fmtDate(d)}</td>
            <td>${badge}</td>
            <td class="cities">${s.list.join(', ')}</td>
        </tr>`;
    }).join('');
}

fetchFromGithub();
</script>
</body>
</html>
