<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מנבא התרעות 2026 - v13 פריסה מלאה</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        :root { 
            --צפון: #2563eb; --מרכז: #dc2626; --דרום: #059669; --יוש: #7c3aed;
            --bg: #0f172a; --card-bg: #1e293b;
        }
        /* הגדרות גוף הדף - גלילה כללית */
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: #f8fafc; 
            margin: 0; 
            padding: 20px; 
            direction: rtl;
            min-height: 100vh;
        }
        .container { max-width: 1300px; margin: auto; }
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            margin-bottom: 25px; 
            border: 1px solid #334155; 
        }
        
        /* פאנל עליון */
        .national-grid { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 20px; }
        .nat-stat { text-align: center; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid #475569; }
        .big-val { font-size: 3em; font-weight: 900; display: block; color: #38bdf8; line-height: 1.1; }
        
        /* הסתברויות עצמאיות */
        .prob-bar-container { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 15px; }
        .prob-row { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .region-label { width: 60px; font-weight: bold; text-align: right; font-size: 1.1em; }
        .bar-bg { flex-grow: 1; background: #334155; height: 26px; border-radius: 13px; overflow: hidden; position: relative; border: 1px solid #475569; }
        .bar-fill { height: 100%; transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .prob-percent { position: absolute; right: 12px; top: 0; line-height: 26px; font-size: 0.95em; font-weight: 900; text-shadow: 1px 1px 2px #000; color: white; }

        /* טבלה ללא גלילה פנימית - תופסת את כל הגובה */
        .table-container { background: rgba(0,0,0,0.1); border-radius: 10px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th { 
            padding: 18px; 
            background: #2d3748; 
            color: #94a3b8; 
            font-weight: 800;
            border-bottom: 3px solid #4a5568;
        }
        td { padding: 15px; border-bottom: 1px solid #334155; }
        
        /* סימון גזרה בצד ימין */
        .row-צפון { border-right: 8px solid var(--צפון); }
        .row-מרכז { border-right: 8px solid var(--מרכז); }
        .row-דרום { border-right: 8px solid var(--דרום); }
        .row-יוש { border-right: 8px solid var(--יוש); }

        .chart-container { height: 350px; width: 100%; }

        @media (max-width: 900px) {
            .national-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="status-panel">מנתח נתונים מה-28.02.26...</div>

    <div id="dashboard" style="display:none">
        <div class="card">
            <h2 style="margin-top:0; color:#cbd5e1; border-bottom: 1px solid #334155; padding-bottom: 10px;">מנבא התרעות אחוד - מצב זירה</h2>
            <div class="national-grid">
                <div class="nat-stat">
                    <span>צפי למטח הבא</span>
                    <span id="natNextTime" class="big-val">--:--</span>
                    <small id="natTimeLeft" style="color:#94a3b8">מחשב זמן...</small>
                </div>
                <div class="nat-stat">
                    <span>עצימות חזויה</span>
                    <span id="natIntensity" class="big-val" style="color:#fbbf24">--</span>
                    <small style="color:#94a3b8">יישובים (ממוצע נע)</small>
                </div>
                <div class="prob-bar-container">
                    <span style="font-size:0.9em; display:block; margin-bottom:12px; font-weight: bold;">הסתברות עצמאית לפי גזרה:</span>
                    <div id="probList"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="chart-container"><canvas id="mainChart"></canvas></div>
        </div>

        <div class="card">
            <h3 style="margin-top:0; color:#94a3b8">יומן אירועים היסטורי (מ-28.02.26)</h3>
            <div class="table-container">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>שעה</th>
                            <th>גזרה</th>
                            <th>יישובים</th>
                            <th>פירוט מיקומים</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
const GITHUB_JSON_URL = 'https://raw.githubusercontent.com/DanielL100/IranAlerts/refs/heads/main/history.json'; 
const CUTOFF_TS = Math.floor(new Date('2026-02-28T00:00:00').getTime() / 1000);
const REGION_COLORS = { 'צפון': '#2563eb', 'מרכז': '#dc2626', 'דרום': '#059669', 'יוש': '#7c3aed' };
const KEYWORDS = {
    'צפון': ['גליל', 'גולן', 'חיפה', 'קריות', 'נהריה', 'עכו', 'צפת', 'קצרין', 'שלומי'],
    'מרכז': ['תל אביב', 'גוש דן', 'שרון', 'שפלה', 'ראשון', 'נתניה', 'פתח תקווה', 'חולון'],
    'דרום': ['עוטף', 'אשקלון', 'אשדוד', 'באר שבע', 'נתיבות', 'שדרות', 'אילת'],
    'יוש': ['יהודה', 'שומרון', 'בנימין', 'אריאל', 'מעלה אדומים']
};

let allSalvos = {}; 
let chart = null;

async function fetchFromGithub() {
    try {
        const response = await fetch(`${GITHUB_JSON_URL}?t=${Date.now()}`);
        const data = await response.json();
        process(data);
        document.getElementById('status-panel').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
    } catch (e) { document.getElementById('status-panel').innerText = "שגיאה בטעינת הקובץ מ-GitHub"; }
}

function process(data) {
    allSalvos = { 'צפון': [], 'מרכז': [], 'דרום': [], 'יוש': [] };
    const bins = { 'צפון': [], 'מרכז': [], 'דרום': [], 'יוש': [] };
    
    // סינון לפי התאריך והסוג שציינת
    const filtered = data.filter(d => d[3] >= CUTOFF_TS && d[1] === 0);

    filtered.forEach(item => {
        const txt = item[2].join(' ');
        for (let r in KEYWORDS) {
            if (KEYWORDS[r].some(k => txt.includes(k))) {
                bins[r].push({ t: item[3], locs: item[2] });
                break;
            }
        }
    });

    for (let r in bins) {
        if (bins[r].length > 0) allSalvos[r] = group(bins[r]);
    }

    calcIndependentModel();
    renderChart();
    renderTable();
}

function group(alerts) {
    alerts.sort((a,b) => a.t - b.t);
    const salvos = [];
    if(alerts.length === 0) return [];
    let cur = { s: alerts[0].t, e: alerts[0].t, count: alerts[0].locs.length, list: new Set(alerts[0].locs) };
    for(let i=1; i<alerts.length; i++) {
        if(alerts[i].t - cur.e <= 300) {
            cur.e = alerts[i].t;
            cur.count += alerts[i].locs.length;
            alerts[i].locs.forEach(l => cur.list.add(l));
        } else {
            salvos.push(cur);
            cur = { s: alerts[i].t, e: alerts[i].t, count: alerts[i].locs.length, list: new Set(alerts[i].locs) };
        }
    }
    salvos.push(cur);
    return salvos;
}

function calcIndependentModel() {
    const now = Math.floor(Date.now() / 1000);
    let flat = [];
    Object.keys(allSalvos).forEach(r => allSalvos[r].forEach(s => flat.push({...s, region: r})));
    flat.sort((a,b) => a.s - b.s);

    if(flat.length < 2) return;

    // חיזוי זמן - תיקון שעה שעברה
    let intervals = [];
    for(let i=1; i<flat.length; i++) intervals.push(flat[i].s - flat[i-1].e);
    const avgInt = intervals.reduce((a,b)=>a+b,0) / intervals.length;
    let predTs = flat[flat.length-1].e + avgInt;
    while(predTs < now) predTs += (avgInt * 0.5);

    document.getElementById('natNextTime').innerText = new Date(predTs*1000).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('natTimeLeft').innerText = `בעוד כ-${Math.round((predTs-now)/60)} דקות`;
    
    // עצימות משוקללת (10 מטחים אחרונים)
    const avgIntensity = flat.slice(-10).reduce((a,b)=>a+b.count,0) / Math.min(flat.length, 10);
    document.getElementById('natIntensity').innerText = Math.round(avgIntensity);

    // הסתברות עצמאית לכל גזרה
    const probList = document.getElementById('probList');
    probList.innerHTML = '';
    
    ['צפון', 'מרכז', 'דרום', 'יוש'].forEach(r => {
        const rSalvos = allSalvos[r] || [];
        if (rSalvos.length === 0) return;

        let rInts = [];
        for(let i=1; i<rSalvos.length; i++) rInts.push(rSalvos[i].s - rSalvos[i-1].e);
        
        const rAvg = rInts.length > 0 ? (rInts.reduce((a,b)=>a+b,0) / rInts.length) : 7200;
        const timeSinceLast = now - rSalvos[rSalvos.length-1].e;
        
        // הסתברות עולה ככל שהזמן שעבר מתקרב לממוצע הגזרתי
        let prob = Math.round((timeSinceLast / rAvg) * 85); 
        const recentFactor = rSalvos.filter(s => (now - s.s) < 43200).length; // חצי יום אחרון
        prob += (recentFactor * 4); 

        const finalP = Math.min(Math.max(prob, 2), 99);

        probList.innerHTML += `
            <div class="prob-row">
                <span class="region-label">${r}</span>
                <div class="bar-bg">
                    <div class="bar-fill" style="width:${finalP}%; background:${REGION_COLORS[r]}"></div>
                    <span class="prob-percent">${finalP}%</span>
                </div>
            </div>`;
    });
}

function renderTable() {
    const tbody = document.querySelector('#historyTable tbody');
    let combined = [];
    Object.keys(allSalvos).forEach(r => allSalvos[r].forEach(s => combined.push({...s, region: r})));
    combined.sort((a,b) => b.s - a.s);

    tbody.innerHTML = combined.map(s => `
        <tr class="row-${s.region}">
            <td>${new Date(s.s*1000).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'})}</td>
            <td><strong>${s.region}</strong></td>
            <td style="font-weight:bold">${s.count}</td>
            <td style="font-size:0.85em; opacity:0.85">${Array.from(s.list).join(', ')}</td>
        </tr>`).join('');
}

function renderChart() {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (chart) chart.destroy();
    const datasets = Object.keys(allSalvos).map(r => ({
        label: r,
        data: allSalvos[r].map(s => ({ x: s.s * 1000, y: s.count })),
        borderColor: REGION_COLORS[r],
        backgroundColor: REGION_COLORS[r] + '15',
        tension: 0.3,
        fill: true
    }));
    chart = new Chart(ctx, {
        type: 'line',
        data: { datasets },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            scales: { 
                x: { type: 'time', grid: { color: '#334155' } }, 
                y: { beginAtZero: true, grid: { color: '#334155' } } 
            },
            plugins: { legend: { position: 'top', align: 'end', labels: { boxWidth: 10, color: '#f8fafc' } } }
        }
    });
}

fetchFromGithub();
setInterval(fetchFromGithub, 60000);
</script>
</body>
</html>
